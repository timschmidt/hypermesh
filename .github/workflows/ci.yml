name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default-exact
            command: cargo test
          - name: no-default-features
            command: cargo check --no-default-features
          - name: all-features
            command: cargo test --all-features
          - name: all-features-clippy
            command: cargo clippy --all-features -- -D warnings
          - name: all-features-docs
            command: cargo doc --all-features --no-deps
          - name: benches
            command: cargo bench --no-run
          - name: fuzz-targets
            command: cargo check --manifest-path fuzz/Cargo.toml --bins

    steps:
      - uses: actions/checkout@v4
        with:
          path: hypermesh
      - uses: actions/checkout@v4
        with:
          repository: timschmidt/hyperreal
          path: hyperreal
      - uses: actions/checkout@v4
        with:
          repository: timschmidt/hyperlattice
          path: hyperlattice
      - uses: actions/checkout@v4
        with:
          repository: timschmidt/hyperlimit
          path: hyperlimit
      - uses: actions/checkout@v4
        with:
          repository: timschmidt/hypertri
          path: hypertri
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: hypermesh
      - run: ${{ matrix.command }}
        working-directory: hypermesh

  demo:
    name: demo-wasm
    runs-on: ubuntu-latest
    env:
      TRUNK_COLOR: never

    steps:
      - uses: actions/checkout@v4
        with:
          path: hypermesh
      - uses: actions/checkout@v4
        with:
          repository: timschmidt/hypergraphics
          path: hypergraphics
      - uses: actions/checkout@v4
        with:
          repository: timschmidt/hyperreal
          path: hyperreal
      - uses: actions/checkout@v4
        with:
          repository: timschmidt/hyperlattice
          path: hyperlattice
      - uses: actions/checkout@v4
        with:
          repository: timschmidt/hyperlimit
          path: hyperlimit
      - uses: actions/checkout@v4
        with:
          repository: timschmidt/hypertri
          path: hypertri
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: hypermesh/examples/hypermesh_ui
      - uses: taiki-e/install-action@v2
        with:
          tool: trunk@0.21.14
      - run: trunk build --release --locked
        working-directory: hypermesh/examples/hypermesh_ui
