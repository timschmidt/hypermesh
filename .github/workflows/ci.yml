name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            command: cargo test
          - name: no-default-features
            command: cargo check --no-default-features
          - name: exact-only
            command: cargo test --no-default-features --features exact
          - name: exact-triangulation
            command: cargo test --no-default-features --features exact-triangulation
          - name: legacy-only
            command: cargo test --no-default-features --features legacy-boolean
          - name: f32-compat
            command: cargo test --no-default-features --features legacy-boolean,f32
          - name: rayon
            command: cargo test --no-default-features --features legacy-boolean,rayon
          - name: f32-rayon
            command: cargo test --no-default-features --features legacy-boolean,f32,rayon
          - name: bevy-examples
            command: cargo check --no-default-features --features bevy --examples
          - name: benches
            command: cargo bench --no-run
          - name: exact-triangulation-benches
            command: cargo bench --no-run --no-default-features --features exact-triangulation
          - name: fuzz-targets
            command: cargo check --manifest-path fuzz/Cargo.toml

    steps:
      - uses: actions/checkout@v4
        with:
          path: hypermesh
      - uses: actions/checkout@v4
        with:
          repository: timschmidt/hyperreal
          path: hyperreal
      - uses: actions/checkout@v4
        with:
          repository: timschmidt/hyperlattice
          path: hyperlattice
      - uses: actions/checkout@v4
        with:
          repository: timschmidt/hyperlimit
          path: hyperlimit
      - uses: actions/checkout@v4
        with:
          repository: timschmidt/hypertri
          path: hypertri
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: hypermesh
      - run: ${{ matrix.command }}
        working-directory: hypermesh
