[package]
name = "hypermesh-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
hypermesh = { path = "..", default-features = false, features = ["exact"] }
hyperlimit = { version = "0.3.0", optional = true }
hypertri = { version = "0.2.0", default-features = false, optional = true }
libfuzzer-sys = "0.4"

[features]
exact-triangulation = [
    "hypermesh/exact-triangulation",
    "dep:hyperlimit",
    "dep:hypertri",
    "hypertri/cdt",
    "hypertri/earcut",
]
legacy-boolean = ["hypermesh/legacy-boolean"]

[[bin]]
name = "exact_mesh_input"
path = "fuzz_targets/exact_mesh_input.rs"
test = false
doc = false
bench = false

[[bin]]
name = "exact_integer_mesh_input"
path = "fuzz_targets/exact_integer_mesh_input.rs"
test = false
doc = false
bench = false

[[bin]]
name = "exact_boolean_preflight"
path = "fuzz_targets/exact_boolean_preflight.rs"
test = false
doc = false
bench = false
required-features = ["exact-triangulation"]

[[bin]]
name = "legacy_boolean_adapter"
path = "fuzz_targets/legacy_boolean_adapter.rs"
test = false
doc = false
bench = false
required-features = ["legacy-boolean"]
