[package]
name = "hypermesh-fuzz"
version = "0.1.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
# Hyper sibling dependency switch: keep both local path and crates.io lines; do not remove either.
# Development mode uses the local path lines. For release, comment those and uncomment the crates.io lines.
hypermesh = { path = "..", default-features = false, features = ["legacy-public-api"] }
hyperlimit = { path = "../../hyperlimit" }
hyperreal = { path = "../../hyperreal" }
hypertri = { path = "../../hypertri", default-features = false, features = ["cdt", "earcut"] }
# hypermesh = { version = "0.3.0", default-features = false }
# hyperlimit = { version = "0.4.0" }
# hyperreal = { version = "0.13.0" }
# hypertri = { version = "0.4.0", default-features = false, features = ["cdt", "earcut"] }
libfuzzer-sys = "0.4"

# Keep transitive sibling crates unified while using local path development mode.
[patch.crates-io]
hyperlattice = { path = "../../hyperlattice" }
hyperlimit = { path = "../../hyperlimit" }
hyperreal = { path = "../../hyperreal" }
hypertri = { path = "../../hypertri" }

[[bin]]
name = "exact_mesh_input"
path = "fuzz_targets/exact_mesh_input.rs"
test = false
doc = false
bench = false

[[bin]]
name = "exact_integer_mesh_input"
path = "fuzz_targets/exact_integer_mesh_input.rs"
test = false
doc = false
bench = false

[[bin]]
name = "mesh_artifact_manifest"
path = "fuzz_targets/mesh_artifact_manifest.rs"
test = false
doc = false
bench = false

[[bin]]
name = "exact_arrangement"
path = "fuzz_targets/exact_arrangement.rs"
test = false
doc = false
bench = false
