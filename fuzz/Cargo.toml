[package]
name = "hypermesh-fuzz"
version = "0.1.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
# Hyper sibling dependency switch: keep both local path and crates.io lines; do not remove either.
# Development mode uses the local path lines. For release, comment those and uncomment the crates.io lines.
hypermesh = { path = "..", default-features = false, features = ["exact", "internal-fuzzing"] }
hyperlimit = { path = "../../hyperlimit", optional = true }
hypertri = { path = "../../hypertri", default-features = false, optional = true }
# hypermesh = { version = "0.3.0", default-features = false, features = ["exact"] }
# hyperlimit = { version = "0.4.0", optional = true }
# hypertri = { version = "0.3.0", default-features = false, optional = true }
libfuzzer-sys = "0.4"

[features]
exact-triangulation = [
    "hypermesh/exact-triangulation",
    "dep:hyperlimit",
    "dep:hypertri",
    "hypertri/cdt",
    "hypertri/earcut",
]
legacy-boolean = ["hypermesh/legacy-boolean"]

[[bin]]
name = "exact_mesh_input"
path = "fuzz_targets/exact_mesh_input.rs"
test = false
doc = false
bench = false

[[bin]]
name = "exact_integer_mesh_input"
path = "fuzz_targets/exact_integer_mesh_input.rs"
test = false
doc = false
bench = false

[[bin]]
name = "mesh_artifact_manifest"
path = "fuzz_targets/mesh_artifact_manifest.rs"
test = false
doc = false
bench = false

[[bin]]
name = "exact_boolean_preflight"
path = "fuzz_targets/exact_boolean_preflight.rs"
test = false
doc = false
bench = false
required-features = ["exact-triangulation"]

[[bin]]
name = "exact_adjacent_polygon"
path = "fuzz_targets/exact_adjacent_polygon.rs"
test = false
doc = false
bench = false
required-features = ["exact-triangulation"]

[[bin]]
name = "legacy_boolean_adapter"
path = "fuzz_targets/legacy_boolean_adapter.rs"
test = false
doc = false
bench = false
required-features = ["legacy-boolean"]
