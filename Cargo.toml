[package]
name = "hypermesh"
version = "0.3.0"
edition = "2024"
description = "Robust 3D mesh boolean and topology library for the hyper geometry stack"
license = "MPL-2.0"
readme = "README.md"
repository = "https://github.com/timschmidt/hypermesh"
authors = ["Saki Komikado <komietty@gmail.com>", "Timothy Schmidt <timschmidt@gmail.com>"]
keywords = ["3d", "geometry", "graphics", "modeling", "mesh"]
categories = ["algorithms", "mathematics", "graphics", "simulation", "game-development"]
exclude = ["/examples", ".gitignore"]

[dependencies]
# Hyper sibling dependency switch: keep both local path and crates.io lines; do not remove either.
# Development mode uses the local path lines. For release, comment those and uncomment the crates.io lines.
hyperlimit = { path = "../hyperlimit" }
hyperreal = { path = "../hyperreal" }
hypertri = { path = "../hypertri", default-features = false, features = ["earcut", "cdt"] }
# hyperlimit = { version = "0.4.0" }
# hyperreal = { version = "0.13.0" }
# hypertri = { version = "0.4.0", default-features = false, features = ["earcut", "cdt"] }
bevy = { version = "0.16.1", optional = true }
bevy_panorbit_camera = { version = "0.26.0", optional = true }

# Keep transitive sibling crates unified while using local path development mode.
[patch.crates-io]
hyperlattice = { path = "../hyperlattice" }
hyperlimit = { path = "../hyperlimit" }
hyperreal = { path = "../hyperreal" }

[dev-dependencies]
proptest = "1.7.0"

[features]
default = []

bevy = [
    "dep:bevy",
    "dep:bevy_panorbit_camera",
]

[[example]]
name = "menger_sponge"
path = "examples/menger_sponge.rs"
required-features = ["bevy"]

[[example]]
name = "multiple_models"
path = "examples/multiple_models.rs"
required-features = ["bevy"]
