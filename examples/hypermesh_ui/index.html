<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Interactive hypermesh exact CSG demo" />
    <title>hypermesh CSG demo</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #111418;
        color: #d8dee8;
        overflow: hidden;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      #loading_text {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <canvas id="the_canvas_id"></canvas>
    <div id="loading_text">Loading hypermesh exact CSG demo...</div>
  </body>
</html>
